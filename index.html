  <script>
  function Register_kill_exe() {
    const text = 'Stop-Process -Name "Register" -Force -ErrorAction SilentlyContinue; & "C:\\OKChartNET\\Program_OKBin\\Register.exe"';
    navigator.clipboard.writeText(text).then(function() {
    alert("복사 완료!");
    }, function(err) {
      alert("복사 실패 😢");
    });
  }

  function okchart_kill_exe() {
    const text = 'Stop-Process -Name "OKChart" -Force -ErrorAction SilentlyContinue; & "C:\\OKChartNET\\Program_OKBin\\OKChart.exe"';
    navigator.clipboard.writeText(text).then(function() {
    alert("복사 완료!");
    }, function(err) {
      alert("복사 실패 😢");
    });
  }

  function openControlPanel() {
    const text = 'control';
    navigator.clipboard.writeText(text).then(function() {
    alert("복사 완료!");
    }, function(err) {
      alert("복사 실패 😢");
    });
  }

  function openAllTools() {
    const text = `
  Start-Process control.exe -ArgumentList "/name Microsoft.NetworkAndSharingCenter /page Advanced";
  Start-Process control.exe -ArgumentList "/name Microsoft.UserAccounts";
  Start-Process devmgmt.msc;
  Start-Process powercfg.cpl;
    `.trim();
  
    navigator.clipboard.writeText(text).then(function() {
      alert("복사 완료! PowerShell에 붙여넣기 👍");
    }, function(err) {
      alert("복사 실패 😢");
    });
  }
